name: Monthly Authority Report

on:
  schedule:
    - cron: '0 2 5 * *'
  workflow_dispatch:

jobs:
  generate-monthly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate monthly report draft
        run: npm run report:monthly

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: generate monthly authority report draft'
          title: 'chore: monthly authority report draft'
          body: |
            自动生成权威动态月报初稿，请人工补充监管/司法要点并核验链接后合并。
          branch: chore/monthly-authority-report
          delete-branch: true
